<!doctype html>
<html lang="zh-CN">
<head>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23020202'/%3E%3Crect x='18' y='10' width='28' height='44' fill='none' stroke='%23d8c07a' stroke-width='3'/%3E%3Ccircle cx='32' cy='27' r='8' fill='%238fddea'/%3E%3C/svg%3E">

  <link rel="stylesheet" href="./base.css" />
  <style>
    :root {
      --line: rgba(238,233,220,.14);
    }
    .corridor {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1080px;
      min-height: 720px;
      overflow: hidden;
      background:
        radial-gradient(circle at 48% 33%, rgba(216,192,122,.10), transparent 15%),
        radial-gradient(circle at 60% 62%, rgba(143,221,234,.06), transparent 26%),
        linear-gradient(180deg, #080807 0%, #020202 66%, #000 100%);
    }
    .room {
      position: absolute;
      inset: 0;
      perspective: 1200px;
      pointer-events: none;
    }
    .wall {
      position: absolute;
      left: 8vw;
      right: 8vw;
      top: 7vh;
      height: 68vh;
      background: linear-gradient(180deg, rgba(18,18,16,.96), rgba(4,4,4,.96));
      border-top: 1px solid rgba(238,233,220,.07);
      box-shadow: inset 0 0 160px rgba(255,255,255,.018), 0 46px 160px rgba(0,0,0,.72);
      mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    }
    .floor {
      position: absolute;
      left: -18vw;
      right: -18vw;
      bottom: -34vh;
      height: 58vh;
      transform: rotateX(65deg);
      transform-origin: 50% 0;
      border-top: 1px solid rgba(238,233,220,.06);
      background: linear-gradient(180deg, rgba(22,22,20,.50), #020202 68%);
    }
    .light {
      position: absolute;
      left: 50%;
      top: 2vh;
      width: 68vw;
      height: 70vh;
      transform: translateX(-50%);
      background: conic-gradient(from 180deg at 50% 0%, transparent 0 34%, rgba(238,233,220,.11) 42%, rgba(143,221,234,.07) 50%, rgba(238,233,220,.11) 58%, transparent 66% 100%);
      filter: blur(20px);
      opacity: .70;
      mix-blend-mode: screen;
    }
    .topline {
      position: absolute;
      left: clamp(40px, 5vw, 80px);
      right: clamp(40px, 5vw, 80px);
      top: 34px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      color: #8d887f;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .15em;
    }
    .topline a { color: #d9cfb2; }
    .intro {
      position: absolute;
      left: clamp(48px, 6vw, 90px);
      top: clamp(88px, 14vh, 140px);
      z-index: 8;
      width: min(440px, 32vw);
    }
    .kicker {
      color: var(--gold);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .18em;
      margin-bottom: 24px;
    }
    h1, h2 {
      margin: 0;
      font-family: var(--serif);
      line-height: 1.04;
      text-wrap: pretty;
    }
    h1 { font-size: clamp(48px, 5vw, 76px); }
    .intro p {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.85;
    }
    .progress-panel {
      margin-top: 28px;
      border-top: 1px solid rgba(216,192,122,.28);
      padding-top: 15px;
      color: #958d82;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .12em;
    }
    .hint {
      margin-top: 12px;
      color: #776f65;
      font-size: 12px;
      line-height: 1.7;
    }
    .progress-bar {
      height: 2px;
      background: rgba(238,233,220,.11);
      margin-top: 12px;
    }
    .progress-bar i {
      display: block;
      height: 100%;
      width: var(--w, 0%);
      background: linear-gradient(90deg, var(--cyan), var(--gold));
    }
    .rail-wrap {
      position: absolute;
      left: 0;
      right: 0;
      top: 12vh;
      bottom: 18vh;
      z-index: 7;
      overflow: hidden;
      pointer-events: none;
      mask-image: linear-gradient(90deg, transparent 0, #000 14%, #000 86%, transparent 100%);
    }
    .rail {
      height: 100%;
      position: relative;
      display: grid;
      place-items: center;
      transform: translateX(0);
      transition: none;
    }
    .portrait {
      position: absolute;
      width: clamp(132px, 12vw, 166px);
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
      transform: translateX(calc(var(--distance, 0) * 44vw)) translateY(28px) scale(.66);
      transition: transform .58s cubic-bezier(.16,1,.3,1), opacity .42s, filter .42s, width .48s cubic-bezier(.16,1,.3,1);
      opacity: 0;
      filter: blur(2px) grayscale(1);
      pointer-events: auto;
    }
    .portrait.active {
      width: clamp(218px, 19vw, 286px);
      transform: translateX(0) translateY(-18px) scale(1);
      opacity: 1;
      filter: grayscale(1);
      z-index: 4;
    }
    .portrait.near {
      opacity: .58;
      filter: blur(.2px) grayscale(1);
      z-index: 2;
    }
    .portrait.locked { opacity: 0; }
    .portrait.locked.active { opacity: 1; }
    .portrait.locked.near { opacity: .58; }
    .photo {
      position: relative;
      width: 100%;
      height: clamp(206px, 26vw, 384px);
      background:
        radial-gradient(circle at 50% 26%, rgba(238,233,220,.50), rgba(238,233,220,.10) 22%, transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.02)),
        #080808;
      border: 1px solid rgba(216,192,122,.34);
      outline: 1px solid rgba(238,233,220,.075);
      outline-offset: 8px;
      box-shadow:
        0 34px 80px rgba(0,0,0,.45),
        0 0 0 9px rgba(8,8,7,.72),
        0 0 0 10px rgba(216,192,122,.11),
        inset 0 0 70px rgba(255,255,255,.025);
      overflow: hidden;
      filter: grayscale(1);
    }
    .photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--photo-pos, 50% 50%);
      opacity: .78;
      filter: grayscale(1) contrast(.88) brightness(.76) sepia(.08);
      transform: scale(1.025);
    }
    .photo.has-image::before {
      opacity: 0;
    }
    .photo.has-image::after {
      background:
        linear-gradient(180deg, rgba(238,233,220,.08), transparent 24%, rgba(0,0,0,.28) 100%),
        linear-gradient(115deg, transparent 0 44%, rgba(255,255,255,.13) 48%, transparent 52% 100%);
    }
    .portrait.active .photo {
      box-shadow:
        0 42px 130px rgba(0,0,0,.58),
        0 0 0 10px rgba(8,8,7,.82),
        0 0 0 11px rgba(216,192,122,.18),
        0 0 0 18px rgba(238,233,220,.035),
        inset 0 0 90px rgba(255,255,255,.032);
    }
    .portrait:not(.active).locked .photo {
      background:
        radial-gradient(circle at 50% 28%, rgba(238,233,220,.28), rgba(238,233,220,.07) 24%, transparent 44%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        #050505;
    }
    .photo::before {
      content: attr(data-initials);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(238,233,220,.24);
      font-family: var(--serif);
      font-size: clamp(66px, 8vw, 132px);
      letter-spacing: -.08em;
    }
    .portrait:not(.active).locked .photo::before { color: rgba(238,233,220,.16); }
    .photo::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(238,233,220,.10);
      background-image: linear-gradient(115deg, transparent 0 44%, rgba(255,255,255,.13) 48%, transparent 52% 100%);
      background-clip: padding-box;
      opacity: .24;
    }
    .portrait small {
      display: block;
      margin-top: 13px;
      color: #7b746a;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .13em;
    }
    .portrait strong {
      display: block;
      margin-top: 7px;
      color: var(--ink);
      font-family: var(--serif);
      font-size: clamp(18px, 1.7vw, 28px);
      font-weight: 600;
      line-height: 1.1;
    }
    .photo-credit {
      display: block;
      margin-top: 7px;
      color: #59534b;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: .12em;
    }
    .portrait.near small,
    .portrait.near strong { opacity: 0; }
    .portrait:not(.active).locked strong { color: #c7bfae; }
    .detail {
      position: absolute;
      right: clamp(54px, 7vw, 112px);
      top: clamp(128px, 18vh, 178px);
      z-index: 12;
      width: min(390px, 29vw);
      max-height: 58vh;
      overflow: auto;
      border-top: 1px solid rgba(216,192,122,.30);
      padding-top: 20px;
      scrollbar-color: rgba(216,192,122,.42) transparent;
      animation: detailRise .48s cubic-bezier(.16,1,.3,1);
      transition: opacity .2s ease, transform .2s ease;
      background: linear-gradient(90deg, rgba(2,2,2,.88), rgba(2,2,2,.58) 62%, rgba(2,2,2,0));
      box-shadow: -34px 0 80px rgba(0,0,0,.24);
    }
    .detail.is-swapping {
      opacity: 0;
      transform: translateY(18px);
    }
    .detail .tag {
      color: var(--gold);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .16em;
      margin-bottom: 13px;
    }
    .detail h2 {
      font-size: clamp(32px, 3vw, 48px);
      font-weight: 600;
    }
    .detail p {
      margin: 12px 0 0;
      color: #928b80;
      font-size: 14px;
      line-height: 1.75;
      text-wrap: pretty;
    }
    .bio-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
      margin: 18px 0 2px;
      padding-top: 14px;
      border-top: 1px solid rgba(238,233,220,.13);
    }
    .bio-meta span {
      color: #bdb39d;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.45;
      letter-spacing: .10em;
    }
    .bio-meta b {
      display: block;
      margin-bottom: 4px;
      color: var(--gold);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .14em;
    }
    .relic {
      margin-top: 16px;
      padding: 16px 0 0;
      border-top: 1px solid rgba(238,233,220,.15);
    }
    .relic.unlocked {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 18px;
      align-items: start;
      border-top-color: rgba(216,192,122,.36);
    }
    .relic.locked {
      opacity: .46;
      border-top-style: dashed;
    }
    .totem {
      width: 70px;
      height: 70px;
      color: var(--gold);
      filter: drop-shadow(0 0 24px rgba(216,192,122,.20));
    }
    .totem svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .totem.locked {
      color: #6f685e;
      filter: none;
    }
    .relic b {
      display: block;
      color: #d7c68e;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      margin-bottom: 8px;
    }
    .relic p {
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .chip {
      color: #bdb39d;
      border-top: 1px solid rgba(238,233,220,.18);
      padding-top: 6px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .10em;
    }
    .intro {
      width: min(310px, 23vw);
      top: clamp(96px, 15vh, 150px);
    }
    .intro h1 { font-size: clamp(38px, 3.8vw, 58px); }
    .intro p { font-size: 14px; line-height: 1.78; }
    .progress-panel { margin-top: 22px; }
    @keyframes detailRise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .controls {
      position: absolute;
      left: clamp(48px, 6vw, 90px);
      bottom: clamp(44px, 7vh, 82px);
      z-index: 14;
      display: flex;
      gap: 16px;
    }
    .controls button, .controls a {
      border: 0;
      border-top: 1px solid rgba(238,233,220,.22);
      padding: 10px 0 0;
      width: 112px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .13em;
    }
    .next-gallery {
      position: absolute;
      right: clamp(48px, 6vw, 90px);
      bottom: clamp(44px, 7vh, 82px);
      z-index: 14;
      width: 178px;
      border-top: 1px solid rgba(216,192,122,.28);
      padding-top: 10px;
      color: #cfc4a8;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .13em;
      text-align: right;
      transition: color .28s ease, border-color .28s ease, opacity .28s ease;
    }
    .next-gallery:hover,
    .next-gallery:focus-visible {
      color: var(--ink);
      border-color: rgba(216,192,122,.56);
      outline: none;
    }
    .inscription {
      margin-top: 24px;
      border-top: 1px solid rgba(238,233,220,.16);
      padding-top: 15px;
      color: #827b71;
      font-family: var(--serif);
      font-size: 13px;
      line-height: 1.85;
    }
    .inscription .label {
      color: var(--gold);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .14em;
      margin-bottom: 10px;
    }
    .quote, .source { transition: opacity .35s ease; }
    .source {
      margin-top: 10px;
      color: #6f685f;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
    }
    .quote.fade, .source.fade { opacity: 0; }
    .portal-transition.active { opacity: 1; animation: walkBlackout .96s cubic-bezier(.76,0,.24,1) forwards; }
    .portal-transition::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10vmin;
      aspect-ratio: 1;
      transform: translate(-50%, -50%) scale(.08);
      border-radius: 50%;
      border: 1px solid rgba(238,233,220,.72);
      box-shadow: 0 0 90px rgba(238,233,220,.30), inset 0 0 38px rgba(143,221,234,.20);
      opacity: 0;
    }
    .portal-transition.active::before { animation: portalOpen .82s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes portalOpen {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.08); }
      18% { opacity: 1; }
      100% { opacity: .18; transform: translate(-50%, -50%) scale(24); }
    }
    @keyframes portalBlackout {
      0% { background: rgba(0,0,0,0); }
      62% { background: rgba(0,0,0,.26); }
      100% { background: rgba(0,0,0,1); }
    }
      body.is-entering::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 48%, rgba(238,233,220,.14), rgba(216,192,122,.045) 34%, rgba(3,3,2,.28) 100%);
      animation: pageReveal .72s cubic-bezier(.22,1,.36,1) forwards;
    }
    body.is-leaving main > :not(.portal-transition) {
      opacity: .72;
      filter: none !important;
      transition: opacity .52s cubic-bezier(.22,1,.36,1);
    }
    .portal-transition.active { opacity: 1; animation: pageVeil .52s cubic-bezier(.22,1,.36,1) forwards !important; }
    .portal-transition.active::before { animation: none !important; opacity: 0 !important; transform: none !important; }
    @keyframes pageVeil {
      0% { background: rgba(0,0,0,0); }
      100% { background: radial-gradient(ellipse at 50% 48%, rgba(238,233,220,.14), rgba(216,192,122,.050) 36%, rgba(3,3,2,.18) 100%); }
    }
     @keyframes pageReveal {
      from { opacity: 1; }
      to { opacity: 0; }
    }

  </style>

  <script>
    const people = window.PhysicistAtlasData.people;
    const portraitPhotos = window.PhysicistPortraits || {};
    const corridorBios = {
      feynman: { field: "量子电动力学", period: "1918-1988", intro: "费曼以路径积分和费曼图重塑了量子电动力学的计算语言，也把复杂物理讲成了几乎能被直觉看见的图像。他的展签突出一种罕见能力：把抽象理论、计算技巧和实验判断压缩成清晰的物理图景。", work: "路径积分、费曼图、量子电动力学重整化" },
      bohr: { field: "量子论", period: "1885-1962", intro: "玻尔提出原子结构模型，并在哥本哈根学派中塑造了互补性与量子测量的解释框架。他的走廊位置像一间讨论室：一整代物理学家在这里围绕原子、测量与现实展开辩论，玻尔是持续的中心。", work: "玻尔原子模型、互补原理、哥本哈根解释" },
      einstein: { field: "相对论 / 光量子", period: "1879-1955", intro: "爱因斯坦用相对论改变了空间、时间与引力的含义，也用光电效应解释推动了量子论的成立。他在这条走廊里代表一种宏观秩序感：从简单原则出发，重新规定宇宙的基本语法。", work: "狭义相对论、广义相对论、光电效应解释" },
      fermi: { field: "核物理 / 统计物理", period: "1901-1954", intro: "费米兼具理论判断和实验手感，是二十世纪少见的全能型物理学家。他从费米统计到核反应堆，把微观粒子规律推向可操作的工程现实，也让“估算”成为一种强大的科学方法。", work: "费米-狄拉克统计、弱相互作用理论、首座核反应堆" },
      pauli: { field: "量子力学", period: "1900-1958", intro: "泡利提出不相容原理，解释了电子壳层结构和物质稳定性的深层原因。他的展签强调严格性：一个简洁的禁令如何支撑周期表、化学键以及普通物质的秩序。", work: "泡利不相容原理、自旋理论、泡利矩阵" },
      millikan: { field: "实验物理", period: "1868-1953", intro: "密立根通过油滴实验测定基本电荷，给电子电荷提供了精确数值。他适合放在实验方法展段：微小液滴、强电场和长期重复测量共同构成现代精密实验的经典场景。", work: "油滴实验、基本电荷测定、光电效应实验研究" },
      schrodinger: { field: "波动力学", period: "1887-1961", intro: "薛定谔用波动方程为量子力学提供了另一种数学表达，使微观粒子的状态可以作为波函数演化。走廊简介聚焦于波函数、方程与量子叠加，这些才是他留下的核心遗产。", work: "薛定谔方程、波动力学、量子叠加思想实验" },
      franklin: { field: "X 射线晶体学", period: "1920-1958", intro: "富兰克林以高质量 X 射线衍射图像推进了 DNA 结构研究。她在物理学家走廊中连接成像技术与生命结构：看见不可见的分子秩序，本身就是现代物理方法的胜利。", work: "DNA X 射线衍射、Photo 51、晶体学成像" },
      maxwell: { field: "电磁理论", period: "1831-1879", intro: "麦克斯韦把电、磁与光统一在一组方程中，预言电磁波存在。他的展位是整条走廊的古典支柱：世界第一次显得可以由场、方程和传播速度共同组织起来。", work: "麦克斯韦方程组、电磁场理论、光的电磁理论" },
      dirac: { field: "相对论量子力学", period: "1902-1984", intro: "狄拉克方程把量子力学与狭义相对论结合，并预言了反物质。他的简介适合极简处理：少量符号、极高密度，一个方程直接打开了电子自旋与正电子的世界。", work: "狄拉克方程、反物质预言、量子场论基础" },
      curie: { field: "放射性研究", period: "1867-1934", intro: "居里夫人开创性研究放射性，并发现钋和镭。她的展签应带有材料感：矿渣、暗光、长期分离与测量，显示现代物理如何在艰苦实验中辨认新的自然过程。", work: "放射性研究、钋和镭的发现、放射化学" },
      vonneumann: { field: "数学物理 / 计算", period: "1903-1957", intro: "冯·诺依曼为量子力学数学基础、博弈论和现代计算机体系结构作出关键贡献。他在走廊中像一座桥：从抽象公理到计算机器，连接理论物理和信息时代。", work: "量子力学数学基础、冯·诺依曼结构、博弈论" },
      wood: { field: "光学实验", period: "1868-1955", intro: "伍德以光学实验和反伪科学调查闻名，展示了物理学家的另一种公共角色：用实验拆穿幻象，用光谱、偏振和仪器判断现象是否真实。", work: "伍德灯、紫外摄影、光学实验与科学辨伪" },
      lorentz: { field: "经典电子论", period: "1853-1928", intro: "洛伦兹提出电子论和洛伦兹变换，为狭义相对论铺设数学道路。他的展位适合放在经典到现代的门槛处：旧理论的精密结构如何逼近新时空观。", work: "洛伦兹变换、电子论、洛伦兹力" },
      planck: { field: "量子论起点", period: "1858-1947", intro: "普朗克在黑体辐射问题中引入能量量子，打开量子物理的大门。这是一次被实验逼出来的谨慎改写：连续世界第一次出现离散刻度，物理学从此进入新的语法。", work: "能量量子假设、黑体辐射公式、普朗克常数" },
      galileo: { field: "近代科学方法", period: "1564-1642", intro: "伽利略把观察、实验和数学描述结合起来，为近代物理奠定方法基础。他的走廊位置像序章：从望远镜、斜面和运动研究开始，自然被转化为可测量的对象。", work: "自由落体研究、惯性思想、天文观测" },
      sagan: { field: "行星科学 / 科学传播", period: "1934-1996", intro: "萨根研究行星大气和宇宙生命可能性，也以科学传播塑造公众的宇宙想象。他的展签提醒观众：物理学不只发生在实验室，也改变人类理解自身位置的方式。", work: "行星科学、宇宙生命讨论、旅行者金唱片" },
      wu: { field: "实验核物理", period: "1912-1997", intro: "吴健雄通过精密实验验证弱相互作用中宇称不守恒，改变了物理学对对称性的理解。她的展位应突出低温装置、钴-60 衰变和一个被实验推翻的基本直觉。", work: "吴实验、宇称不守恒验证、β 衰变研究" },
      hawking: { field: "黑洞 / 宇宙学", period: "1942-2018", intro: "霍金把广义相对论、量子场论和热力学带入黑洞研究，提出黑洞辐射。他的简介适合处理为一段深色宇宙展签：边界、熵、奇点和信息问题彼此交错。", work: "霍金辐射、奇点定理、黑洞热力学" },
      heisenberg: { field: "矩阵力学", period: "1901-1976", intro: "海森堡建立矩阵力学并提出不确定性原理，使微观世界告别经典可视化图像。他的展签像一道雾墙：物理学在原则上重新定义了可知的边界，精度的极限来自自然本身。", work: "矩阵力学、不确定性原理、量子理论基础" }
    };
    const storageKey = "physicistAtlas:v1";
    const rail = document.getElementById("rail");
    const detail = document.getElementById("detail");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    let active = 0;

    function readAtlasState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || { unlocked: [], totalTests: 0, lastResult: null, unlockedAt: {} };
      } catch {
        return { unlocked: [], totalTests: 0, lastResult: null, unlockedAt: {} };
      }
    }

    function isUnlocked(person) {
      return readAtlasState().unlocked.includes(person.id);
    }

    function dateLabel(iso) {
      if (!iso) return "UNKNOWN DATE";
      return new Date(iso).toLocaleDateString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit" });
    }

    function renderProgress() {
      const state = readAtlasState();
      progressText.textContent = `RELICS ${state.unlocked.length}/${people.length} · TESTS ${state.totalTests || 0}`;
      progressBar.style.setProperty("--w", `${(state.unlocked.length / people.length) * 100}%`);
      if (state.lastResult) {
        const lastIndex = people.findIndex(person => person.id === state.lastResult);
        if (lastIndex >= 0) active = lastIndex;
      }
    }

    function renderRail() {
      rail.innerHTML = people.map((p, index) => {
        const unlocked = isUnlocked(p);
        const photo = portraitPhotos[p.id];
        const rawDistance = index - active;
        const wrappedDistance = rawDistance > people.length / 2 ? rawDistance - people.length : rawDistance < -people.length / 2 ? rawDistance + people.length : rawDistance;
        const near = Math.abs(wrappedDistance) === 1;
        return `<button class="portrait ${index === active ? "active" : ""} ${near ? "near" : ""} ${unlocked ? "unlocked" : "locked"}" type="button" data-index="${index}" style="--distance:${wrappedDistance}">
          <div class="photo ${photo ? "has-image" : ""}" data-initials="${p.initials}" style="${photo ? `--photo-pos:${photo.pos}` : ""}">
            ${photo ? `<img src="${photo.src}" alt="${p.name}肖像" loading="${index === active || near ? "eager" : "lazy"}" referrerpolicy="no-referrer" onerror="this.remove(); this.parentElement.classList.remove('has-image');">` : ""}
          </div>
          <small>${unlocked ? "RELIC LIT" : "RELIC DARK"} · NO.${String(p.index).padStart(2, "0")}</small>
          <strong>${p.name}</strong>
          ${photo ? `<span class="photo-credit">PORTRAIT · ${photo.credit}</span>` : ""}
        </button>`;
      }).join("");
      rail.querySelectorAll(".portrait").forEach(btn => {
        btn.addEventListener("click", () => setActive(Number(btn.dataset.index)));
      });
    }

    function updateRail() {
      const portraits = rail.querySelectorAll(".portrait");
      portraits.forEach((btn, index) => {
        const rawDistance = index - active;
        const wrappedDistance = rawDistance > people.length / 2 ? rawDistance - people.length : rawDistance < -people.length / 2 ? rawDistance + people.length : rawDistance;
        const near = Math.abs(wrappedDistance) === 1;
        btn.style.setProperty("--distance", wrappedDistance);
        btn.classList.toggle("active", index === active);
        btn.classList.toggle("near", near);
      });
    }

    function renderDetail() {
      const p = people[active];
      const state = readAtlasState();
      const unlocked = isUnlocked(p);
      const totem = renderTotem(p, unlocked);
      const prompt = buildPrompt(p);
      const bio = corridorBios[p.id] || { field: "物理学", period: "", intro: p.analysis[0] || "", work: p.title };
      detail.innerHTML = `
        <div class="tag">${p.id.toUpperCase()} · ${unlocked ? `RELIC UNLOCKED ${dateLabel(state.unlockedAt?.[p.id])}` : "RELIC NOT YET UNLOCKED"}</div>
        <h2>${p.name}</h2>
        <p><b>${bio.field}</b></p>
        <p>${bio.intro}</p>
        <div class="bio-meta">
          <span><b>PERIOD</b>${bio.period}</span>
          <span><b>KEY WORK</b>${bio.work}</span>
        </div>
        <div class="relic ${unlocked ? "unlocked" : "locked"}">
          ${totem}
          <div>
            <b>${unlocked ? `专属信物：${p.relic.name}` : "信物尚未点亮"}</b>
            <p>${unlocked ? p.relic.description : "完成测试并匹配到这位物理学家后，这件信物会以点亮状态留在走廊中。你的浏览器会记住它，关闭网站后也不会清零。"}</p>
          </div>
        </div>
        <p><b>更容易测到这个结果：</b>${prompt}</p>
        <div class="chips"><span class="chip">${bio.field}</span><span class="chip">${unlocked ? "RELIC STORED" : "TEST TO LIGHT RELIC"}</span></div>`;
    }

    function renderTotem(person, unlocked) {
      const n = person.index;
      const rotation = (n * 17) % 180;
      const sides = 3 + (n % 6);
      const inner = 18 + (n % 5) * 3;
      const points = Array.from({ length: sides }, (_, i) => {
        const a = -Math.PI / 2 + i * Math.PI * 2 / sides;
        return `${50 + Math.cos(a) * 29},${50 + Math.sin(a) * 29}`;
      }).join(" ");
      const small = Array.from({ length: 4 + (n % 4) }, (_, i) => {
        const a = i * Math.PI * 2 / (4 + (n % 4)) + n;
        return `<circle cx="${50 + Math.cos(a) * inner}" cy="${50 + Math.sin(a) * inner}" r="${unlocked ? 1.8 : 1.2}" fill="currentColor" opacity="${unlocked ? .9 : .36}"/>`;
      }).join("");
      return `<div class="totem ${unlocked ? "unlocked" : "locked"}" aria-hidden="true">
        <svg viewBox="0 0 100 100">
          <polygon points="${points}" fill="none" stroke="currentColor" stroke-width="${unlocked ? 2.2 : 1.2}" opacity="${unlocked ? .86 : .36}" transform="rotate(${rotation} 50 50)"/>
          <circle cx="50" cy="50" r="${12 + (n % 4) * 4}" fill="none" stroke="currentColor" stroke-width="${unlocked ? 1.8 : 1}" opacity="${unlocked ? .72 : .28}"/>
          <path d="M50 16 L50 84 M16 50 L84 50" stroke="currentColor" stroke-width="${unlocked ? 1.4 : .8}" opacity="${unlocked ? .36 : .16}"/>
          ${small}
        </svg>
      </div>`;
    }

    function buildPrompt(person) {
      const hints = [];
      const target = person.target || {};
      if ((target.T || 0) >= 3) hints.push("偏向理论推演");
      if ((target.E || 0) >= 3) hints.push("偏向实验和动手验证");
      if ((target.I || 0) >= 3) hints.push("相信直觉飞跃");
      if ((target.L || 0) >= 3) hints.push("选择严谨逻辑");
      if ((target.Q || 0) >= 3) hints.push("拥抱概率和不确定性");
      if ((target.C || 0) >= 3) hints.push("坚持秩序与决定论");
      if ((target.S || 0) >= 3) hints.push("更像独自推进问题");
      if ((target.Le || 0) >= 3) hints.push("更像组织者或传播者");
      if ((target.A || 0) >= 3) hints.push("保留跨界、玩心和意象感");
      if ((target.R || 0) >= 3) hints.push("选择克制、刻苦和传统严谨");
      return hints.slice(0, 4).join("，") + "。";
    }

    function setActive(index) {
      const next = (index + people.length) % people.length;
      if (next === active) return;
      detail.classList.add("is-swapping");
      active = next;
      updateRail();
      window.setTimeout(() => {
        renderDetail();
        detail.classList.remove("is-swapping");
      }, 220);
    }

    document.getElementById("prevBtn").addEventListener("click", () => setActive(active - 1));
    document.getElementById("nextBtn").addEventListener("click", () => setActive(active + 1));
    document.getElementById("downloadBtn").addEventListener("click", downloadCard);
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") setActive(active - 1);
      if (event.key === "ArrowRight") setActive(active + 1);
    });

    function downloadCard() {
      const p = people[active];
      const bio = corridorBios[p.id] || { field: "物理学", period: "", intro: "", work: p.title };
      const photo = portraitPhotos[p.id];
      const W = 1200, H = 1600;
      const cvs = document.createElement("canvas");
      cvs.width = W; cvs.height = H;
      const ctx = cvs.getContext("2d");

      function renderCard(imgEl) {
        // Background
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#0a0a09");
        bg.addColorStop(0.6, "#020202");
        bg.addColorStop(1, "#000");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle top light
        const topLight = ctx.createRadialGradient(W * 0.5, H * 0.18, 20, W * 0.5, H * 0.18, W * 0.5);
        topLight.addColorStop(0, "rgba(238,233,220,.12)");
        topLight.addColorStop(0.4, "rgba(216,192,122,.06)");
        topLight.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = topLight;
        ctx.fillRect(0, 0, W, H);

        // Border frame
        ctx.strokeStyle = "rgba(216,192,122,.30)";
        ctx.lineWidth = 2;
        ctx.strokeRect(48, 48, W - 96, H - 96);
        ctx.strokeStyle = "rgba(238,233,220,.08)";
        ctx.lineWidth = 1;
        ctx.strokeRect(64, 64, W - 128, H - 128);

        // Portrait
        const imgSize = 560;
        const imgX = (W - imgSize) / 2;
        const imgY = 180;
        ctx.fillStyle = "#080808";
        ctx.fillRect(imgX - 4, imgY - 4, imgSize + 8, imgSize + 8);
        ctx.strokeStyle = "rgba(216,192,122,.34)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(imgX - 4, imgY - 4, imgSize + 8, imgSize + 8);
        if (imgEl) {
          ctx.save();
          ctx.filter = "grayscale(1) contrast(0.88) brightness(0.76)";
          ctx.drawImage(imgEl, imgX, imgY, imgSize, imgSize);
          ctx.restore();
          const overlay = ctx.createLinearGradient(imgX, imgY, imgX, imgY + imgSize);
          overlay.addColorStop(0, "rgba(238,233,220,.08)");
          overlay.addColorStop(0.7, "rgba(0,0,0,0)");
          overlay.addColorStop(1, "rgba(0,0,0,.28)");
          ctx.fillStyle = overlay;
          ctx.fillRect(imgX, imgY, imgSize, imgSize);
        } else {
          ctx.font = "bold 180px 'Noto Serif SC', serif";
          ctx.fillStyle = "rgba(238,233,220,.18)";
          ctx.textAlign = "center";
          ctx.fillText(p.initials, W / 2, imgY + imgSize / 2 + 60);
        }

        // Header
        ctx.font = "500 22px 'IBM Plex Mono', monospace";
        ctx.fillStyle = "rgba(216,192,122,.80)";
        ctx.textAlign = "center";
        ctx.fillText("NOBEL PHYSICS ATLAS · 诺奖物理人格图鉴", W / 2, 120);

        // Name
        ctx.font = "bold 72px 'Noto Serif SC', serif";
        ctx.fillStyle = "#eee9dc";
        ctx.fillText(p.name, W / 2, 870);

        // Title
        ctx.font = "500 28px 'Noto Sans SC', sans-serif";
        ctx.fillStyle = "rgba(238,233,220,.60)";
        ctx.fillText(p.title, W / 2, 920);

        // Field + Period
        ctx.font = "500 24px 'IBM Plex Mono', monospace";
        ctx.fillStyle = "rgba(216,192,122,.72)";
        ctx.fillText(bio.field + " · " + bio.period, W / 2, 980);

        // Key work
        ctx.font = "400 22px 'Noto Sans SC', sans-serif";
        ctx.fillStyle = "rgba(238,233,220,.50)";
        const workText = bio.work || "";
        if (workText.length > 36) {
          ctx.fillText(workText.slice(0, 36), W / 2, 1040);
          ctx.fillText(workText.slice(36), W / 2, 1072);
        } else {
          ctx.fillText(workText, W / 2, 1040);
        }

        // Intro (wrapped)
        ctx.textAlign = "left";
        ctx.font = "400 22px 'Noto Sans SC', sans-serif";
        ctx.fillStyle = "rgba(238,233,220,.46)";
        const introText = bio.intro || "";
        const maxW = W - 200;
        const lines = [];
        let line = "";
        for (const ch of introText) {
          if (ctx.measureText(line + ch).width > maxW) { lines.push(line); line = ch; }
          else { line += ch; }
        }
        if (line) lines.push(line);
        lines.slice(0, 8).forEach((l, i) => { ctx.fillText(l, 100, 1120 + i * 36); });

        // Footer
        ctx.textAlign = "center";
        ctx.font = "500 18px 'IBM Plex Mono', monospace";
        ctx.fillStyle = "rgba(143,221,234,.50)";
        ctx.fillText("始于有趣，终于有理 · Nobel Physics Interactive Exhibition", W / 2, H - 80);

        // Download
        cvs.toBlob(function (blob) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "physicist-" + p.id + ".png";
          a.click();
          URL.revokeObjectURL(url);
        }, "image/png");
      }

      if (photo && photo.src) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function () { renderCard(img); };
        img.onerror = function () { renderCard(null); };
        img.src = photo.src;
      } else {
        renderCard(null);
      }
    }

    renderProgress();
    renderRail();
    renderDetail();
  </script>
  <script src="./transition-nav.js"></script>
</body>
</html>
