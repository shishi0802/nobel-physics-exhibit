    .portal-transition {

      inset: 0;
      z-index: 100;
      pointer-events: none;

      content: "";

      left: 50%;
      top: 50%;
      width: 10vmin;
      aspect-ratio: 1;
      transform: translate(-50%, -50%) scale(.08);

        <button class="mode" data-mode="transmit" type="button">透光</button>
      </div>
      <button class="tool-toggle" id="microscopeToggle" type="button">开启显微镜</button>
      <p class="panel-hint">点击纸币上的防伪区域，再切换观察条件。显微镜是独立工具，开启后拖动手指或鼠标查看局部线条、纤维和微结构。</p>
      <div class="control-row">
        <label for="zoomSlider">显微镜倍率</label>
        <input id="zoomSlider" type="range" min="2" max="9" value="4.6" step=".01" />
      </div>
      <div class="control-row">
        <label for="angleSlider">倾斜角度</label>
        <input id="angleSlider" type="range" min="-2" max="2" value="0" step=".001" />
      </div>
      <div class="readout" id="readout"></div>
    </section>
    <aside class="inscription">
      物体的颜色并不在物体之中，而在光与眼的关系之中。
      <span>约翰·洛克</span>
    </aside>
    <nav class="navline">
      <a href="./imaging-gallery.html" data-transition>← IMAGING</a>
      <a href="./time-resonance-gallery.html" data-transition>NEXT · TIME</a>
      <a href="./hall.html" data-transition>BACK TO HALL</a>
    </nav>
    <div class="observe-tools" aria-label="观察模式工具">
      <button class="observe-tool" id="observeMicroscope" type="button">显微镜</button>
      <button class="observe-tool exit" id="observeExit" type="button">退出</button>
    </div>
    <div class="portal-transition" id="portalTransition" aria-hidden="true"></div>
  </main>

  <script>
    const chamber = document.getElementById("chamber");
    const stage = document.getElementById("stage");
    const billRig = document.getElementById("billRig");
    const bill = document.getElementById("bill");
    const scope = document.getElementById("scope");
    const scopeView = document.getElementById("scopeView");
    const zoomSlider = document.getElementById("zoomSlider");
    const angleSlider = document.getElementById("angleSlider");
    const readout = document.getElementById("readout");
    const observeLaunch = document.getElementById("observeLaunch");
    const observeExit = document.getElementById("observeExit");
    const microscopeToggle = document.getElementById("microscopeToggle");
    const observeMicroscope = document.getElementById("observeMicroscope");
    let mode = "visible";
    let feature = "ribbon";
    let zoom = 4.6;
    let angle = 0;
    let microscopeOn = false;
    let pointer = { x: .52, y: .48 };
    let pointerCaptured = false;

    const features = {
      ribbon: {
        title: "3-D 安全条带",
        copy: "蓝色安全条带利用微透镜阵列制造运动视差。倾斜时，条带里的钟形图案和 100 字样会呈现相对移动。",
        physics: "微光学阵列 / 运动视差 / 角度选择"
      },
      ink: {
        title: "变色墨水",
        copy: "右下角的墨水区域在不同观察角下改变颜色。微结构和薄膜会选择性反射不同波长，让颜色随视角漂移。",
        physics: "结构色 / 薄膜干涉 / 波长选择"
      },
      watermark: {
        title: "水印与透光",
        copy: "把纸币放到透光环境下，纸张厚度和纤维密度差异会显出隐约图像。它利用的是吸收、散射和透射强度的空间分布。",
        physics: "透射成像 / 散射 / 材料密度"
      },
      microprint: {
        title: "微缩文字",
        copy: "微缩文字依赖高精度制版和印刷。扫描复制会损失边缘锐度，显微镜下能看到普通打印难以保留的线条和断裂特征。",
        physics: "显微成像 / 分辨率 / 调制传递"
      },
      thread: {
        title: "安全线",
        copy: "安全线埋入纸张内部，在透光或紫外环境下显现。它把光谱响应、材料位置和纸张结构绑定在一起。",
        physics: "荧光响应 / 透光检测 / 材料防伪"
      }
    };

    function setMode(next) {
      mode = next;
      chamber.classList.toggle("uv", mode === "uv");
      chamber.classList.toggle("transmit", mode === "transmit");
      document.querySelectorAll(".mode").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
      updateView();
    }

    function setMicroscope(active) {
      microscopeOn = active;
      scope.classList.toggle("active", microscopeOn);
      microscopeToggle.classList.toggle("active", microscopeOn);
      observeMicroscope.classList.toggle("active", microscopeOn);
      microscopeToggle.textContent = microscopeOn ? "关闭显微镜" : "开启显微镜";
      observeMicroscope.textContent = microscopeOn ? "关闭显微镜" : "显微镜";
      stage.classList.toggle("microscope-active", microscopeOn);
      stage.style.touchAction = microscopeOn ? "none" : "";
      updateView();
    }

    function setObserving(active) {
      chamber.classList.toggle("observing", active);
      if (active) setMicroscope(false);
    }

    function setFeature(next) {
      feature = next;
      document.querySelectorAll(".hotspot").forEach(btn => btn.classList.toggle("active", btn.dataset.feature === feature));
      const target = {
        ribbon: [.50, .45],
        ink: [.80, .68],
        watermark: [.31, .43],
        microprint: [.57, .63],
        thread: [.55, .28]
      }[feature];
      pointer = { x: target[0], y: target[1] };
      updateView();
    }

    function updateView() {
      zoom = parseFloat(zoomSlider.value);
      angle = parseFloat(angleSlider.value);
      const x = pointer.x * 100;
      const y = pointer.y * 100;
      const absAngle = Math.abs(angle);
      scope.style.setProperty("--mx", `${x}%`);
      scope.style.setProperty("--my", `${y}%`);
      scopeView.style.setProperty("--zoom", zoom.toFixed(2));
      scopeView.style.setProperty("--bx", `${x}%`);
      scopeView.style.setProperty("--by", `${y}%`);
      bill.style.setProperty("--tilt-shift", `${angle * 46}px`);
      bill.style.setProperty("--angle-skew", `${angle * 7}deg`);
      bill.style.setProperty("--angle-hue", `${angle * 54}deg`);
      bill.style.setProperty("--angle-abs", absAngle.toFixed(3));
      bill.style.setProperty("--overlay-opacity", mode === "visible" ? (.10 + absAngle * .18) : (.30 + absAngle * .10));
      bill.style.setProperty("--mark-opacity", (mode === "visible" ? .12 : .34) + absAngle * .10);
      bill.style.setProperty("--watermark-opacity", mode === "transmit" ? .62 : mode === "visible" ? .06 : .18);
      bill.style.setProperty("--thread-opacity", mode === "uv" || mode === "transmit" ? .82 : .12);
      bill.style.setProperty("--microprint-opacity", microscopeOn ? Math.min(.72, .22 + zoom * .065) : .12);
      billRig.style.transform = `translate(-50%, -50%) rotateX(${48 - angle * 14}deg) rotateY(${angle * 14}deg) rotateZ(${-8 + angle * 8}deg)`;
      const f = features[feature];
      const modeCopy = {
        visible: "可见光下先定位防伪区域。",
        uv: "紫外模式模拟安全线与材料荧光。",
        transmit: "透光模式模拟水印和埋入式安全线。"
      };
      const angleCopy = absAngle > .12 ? "当前倾斜角正在放大视差与薄膜反射差异。" : "可拖动下方倾斜角度滑杆增强视差与结构色变化。";
      const toolCopy = microscopeOn ? "显微镜已开启，拖动手指或鼠标检查局部细节。" : "可开启显微镜作为附加观察工具。";
      readout.innerHTML = `<b>${f.title}</b>：${f.copy}<br>${modeCopy[mode]}${angleCopy}${toolCopy}<span class="source">物理机制：${f.physics} · 图像来源：WIKIMEDIA COMMONS / 教育展示样张</span>`;
    }

    function updatePointerFromEvent(event) {
      const rect = stage.getBoundingClientRect();
      pointer = {
        x: Math.max(.08, Math.min(.92, (event.clientX - rect.left) / rect.width)),
        y: Math.max(.12, Math.min(.86, (event.clientY - rect.top) / rect.height))
      };
      updateView();
    }

    stage.addEventListener("pointerdown", (event) => {
      if (!microscopeOn) return;
      pointerCaptured = true;
      stage.setPointerCapture?.(event.pointerId);
      updatePointerFromEvent(event);
    });
    stage.addEventListener("pointermove", (event) => {
      if (!microscopeOn || (!pointerCaptured && event.pointerType !== "mouse")) return;
      updatePointerFromEvent(event);
    });
    stage.addEventListener("pointerup", (event) => {
      pointerCaptured = false;
      stage.releasePointerCapture?.(event.pointerId);
    });
    stage.addEventListener("pointercancel", () => {
      pointerCaptured = false;
    });
    document.querySelectorAll(".hotspot").forEach(btn => btn.addEventListener("click", () => setFeature(btn.dataset.feature)));
    document.querySelectorAll(".mode").forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
    microscopeToggle.addEventListener("click", () => setMicroscope(!microscopeOn));
    observeMicroscope.addEventListener("click", () => setMicroscope(!microscopeOn));
    observeLaunch.addEventListener("click", () => setObserving(true));
    observeExit.addEventListener("click", () => setObserving(false));
    zoomSlider.addEventListener("input", updateView);
    angleSlider.addEventListener("input", updateView);
setFeature("ribbon");
    setMode("visible");
    setMicroscope(false);
  </script>
  <script src="./ambient-audio.js?v=20260630-audio5"></script>
  <script src="./transition-nav.js"></script>
</body>
</html>
