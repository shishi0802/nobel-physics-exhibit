  <script>
    const atlas = window.PhysicistAtlasData;
    const portraitPhotos = window.PhysicistPortraits || {};
    const storageKey = "physicistAtlas:v1";
    const axes = [
      { id: "method", left: "E", right: "T", label: "方法论", pair: "实验操作 / 理论推演", en: "EXPERIMENT / THEORY", leftName: "实验操作", rightName: "理论推演" },
      { id: "style", left: "L", right: "I", label: "思维流派", pair: "严谨逻辑 / 直觉飞跃", en: "LOGIC / INTUITION", leftName: "严谨逻辑", rightName: "直觉飞跃" },
      { id: "world", left: "C", right: "Q", label: "宇宙观", pair: "决定秩序 / 概率宇宙", en: "CLASSICAL / QUANTUM", leftName: "决定秩序", rightName: "概率宇宙" },
      { id: "ecology", left: "S", right: "Le", label: "工作生态", pair: "孤狼学者 / 团队领袖", en: "SOLO / LEADER", leftName: "孤狼学者", rightName: "团队领袖" },
      { id: "life", left: "R", right: "A", label: "生活做派", pair: "传统刻苦 / 跨界整活", en: "RIGOR / ABSTRACT", leftName: "传统刻苦", rightName: "跨界整活" }
    ];
    const scoreKeys = ["T", "E", "I", "L", "Q", "C", "S", "Le", "A", "R"];
    const loadingLines = [
      "正在观测你的叠加态……",
      "计算费米分布中……",
      "排查微波炉干扰……",
      "量子退相干进行中……",
      "等待波函数坍缩……"
    ];
    const stage = document.getElementById("stage");
    const panel = document.getElementById("panel");
    const resultView = document.getElementById("resultView");
    const loading = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    const canvas = document.getElementById("testCanvas");
    const ctx = canvas.getContext("2d");
    let step = -1;
    let scores = freshScores();
    let t = 0;

    function freshScores() {
      return Object.fromEntries(scoreKeys.map(key => [key, 0]));
    }

    function readAtlasState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || { unlocked: [], totalTests: 0, lastResult: null, unlockedAt: {} };
      } catch {
        return { unlocked: [], totalTests: 0, lastResult: null, unlockedAt: {} };
      }
    }

    function writeAtlasState(resultId) {
      const state = readAtlasState();
      const isNew = !state.unlocked.includes(resultId);
      if (isNew) {
        state.unlocked.push(resultId);
        state.unlockedAt[resultId] = new Date().toISOString();
      }
      state.totalTests += 1;
      state.lastResult = resultId;
      localStorage.setItem(storageKey, JSON.stringify(state));
      return isNew;
    }

    function signedAxis(axis, source = scores) {
      return (source[axis.right] || 0) - (source[axis.left] || 0);
    }

    function axisPercent(axis, source = scores) {
      return Math.max(8, Math.min(92, 50 + signedAxis(axis, source) * 5));
    }

    function axisLeaning(axis, source = scores) {
      const value = signedAxis(axis, source);
      if (Math.abs(value) <= 1) return "两端均衡";
      const name = value >= 0 ? axis.rightName : axis.leftName;
      const strength = Math.abs(value) >= 5 ? "极高" : Math.abs(value) >= 3 ? "偏高" : "中等";
      return `${name}${strength}`;
    }

    function axisDisplay(axis, source = scores) {
      const value = signedAxis(axis, source);
      if (Math.abs(value) <= 1) return "两端均衡";
      return value >= 0 ? axis.rightName : axis.leftName;
    }

    function renderIntro() {
      step = -1;
      scores = freshScores();
      resultView.hidden = true;
      stage.hidden = false;
      panel.hidden = false;
      stage.classList.remove("question-mode");
      document.querySelector(".inscription").classList.remove("hidden-by-stage");
      stage.innerHTML = `<div class="kicker">MEASUREMENT TEST</div><h1>你是哪位物理学家</h1><p class="lead">这是一台展厅里的风格测量仪。20 个选择会把你投影到理论、实验、直觉、概率、协作与生活做派的坐标中。</p><button class="start" id="startBtn" type="button">BEGIN TEST</button>`;
      document.getElementById("startBtn").addEventListener("click", () => { step = 0; renderQuestion(); });
      renderPanel();
    }

    function renderQuestion() {
      const q = atlas.questions[step];
      stage.classList.remove("switching");
      stage.classList.add("question-mode");
      document.querySelector(".inscription").classList.add("hidden-by-stage");
      stage.innerHTML = `<div class="kicker">QUESTION ${String(step + 1).padStart(2, "0")} / ${String(atlas.questions.length).padStart(2, "0")}</div><h2 class="question-title">${q.title}</h2><div class="answers">${q.answers.map((a, i) => `<button class="answer" type="button" data-index="${i}"><small>OPTION ${a.key}</small><span>${a.text}</span></button>`).join("")}</div>`;
      stage.querySelectorAll(".answer").forEach(btn => {
        btn.addEventListener("click", () => chooseAnswer(Number(btn.dataset.index)));
      });
      renderPanel();
    }

    function chooseAnswer(answerIndex) {
      const q = atlas.questions[step];
      q.answers[answerIndex].scores.forEach(({ key, delta }) => {
        scores[key] += delta;
      });
      stage.classList.add("switching");
      window.setTimeout(() => {
        step += 1;
        if (step >= atlas.questions.length) renderLoading();
        else renderQuestion();
      }, 210);
    }

    function renderPanel() {
      const progress = step < 0 ? 0 : Math.min(atlas.questions.length, step);
      panel.innerHTML = `<div class="progress">${step < 0 ? "WAITING" : `PROGRESS ${progress}/${atlas.questions.length}`}</div><div class="meter"><i style="--w:${(progress / atlas.questions.length) * 100}%"></i></div>${axes.map(axis => {
        const pct = axisPercent(axis);
        const delta = pct - 50;
        return `<div class="axis-row"><label><span>${axis.label}</span><span>${axis.pair}</span></label><div class="axis-bar"><i style="--pos:${Math.min(pct, 50)}%; --delta:${Math.abs(delta)}%"></i></div></div>`;
      }).join("")}`;
    }

    function renderLoading() {
      stage.hidden = true;
      stage.classList.remove("question-mode");
      panel.hidden = true;
      loading.hidden = false;
      let i = 0;
      loadingText.textContent = loadingLines[0];
      const timer = window.setInterval(() => {
        i += 1;
        loadingText.textContent = loadingLines[i % loadingLines.length];
      }, 640);
      window.setTimeout(() => {
        window.clearInterval(timer);
        loading.hidden = true;
        renderResult(matchProfile());
      }, 3600);
    }

    function distanceTo(person) {
      return scoreKeys.reduce((sum, key) => sum + Math.pow((scores[key] || 0) - (person.target[key] || 0), 2), 0);
    }

    function matchProfile() {
      const ranked = atlas.people
        .map(person => ({
          person,
          distance: distanceTo(person),
          intensity: Object.values(person.target).reduce((sum, n) => sum + Math.abs(n), 0)
        }))
        .sort((a, b) => a.distance - b.distance || b.intensity - a.intensity);
      return ranked[0].person;
    }

    function renderResult(person) {
      const isNew = writeAtlasState(person.id);
      const photo = portraitPhotos[person.id];
      const bars = axes.map(axis => {
        const pct = axisPercent(axis);
        return `<div class="axis-row"><label><span class="axis-copy">${axis.label}：${axisDisplay(axis)}<small>${axis.pair} · ${axis.en}</small></span><span>${Math.round(pct)}%</span></label><div class="axis-bar"><i style="--pos:${Math.min(pct, 50)}%; --delta:${Math.abs(pct - 50)}%"></i></div></div>`;
      }).join("");
      const summary = axes.map(axis => `<span class="summary-chip"><b>${axis.label}</b><span>${axisLeaning(axis)}<small>${axis.pair}</small></span></span>`).join("");
      resultView.hidden = false;
      resultView.innerHTML = `
        <section class="result-hero">
          <div class="result-id">
            <div class="result-portrait ${photo ? "has-image" : ""}" style="${photo ? `--photo-pos:${photo.pos}` : ""}">
              ${photo ? `<img src="${photo.src}" alt="${person.name}肖像" referrerpolicy="no-referrer" onerror="this.remove(); this.parentElement.classList.remove('has-image'); this.parentElement.textContent='${person.initials}';">` : person.initials}
            </div>
            <div>
              <div class="kicker">${isNew ? "RELIC UNLOCKED" : "RELIC ALREADY STORED"}</div>
              <h1>${person.name}</h1>
              <p class="lead">${person.title}</p>
              <div class="result-totem">${renderTotem(person)}<div><b>专属信物已点亮</b><span>${person.relic.name}</span></div></div>
            </div>
          </div>
          <div class="result-summary">${summary}</div>
          <div class="result-actions">
            <button class="restart" id="restartBtn" type="button">重新测量</button>
            <a class="corridor-link" href="./physicist-corridor.html" data-transition>进入走廊</a>
          </div>
        </section>
        <section class="result-copy">
          ${bars}
          <div class="relic"><b>专属信物：${person.relic.name}</b><p>${person.relic.description}</p></div>
          ${person.analysis.map(p => `<p>${p}</p>`).join("")}
        </section>`;
      document.getElementById("restartBtn").addEventListener("click", renderIntro);
      attachTransitions(resultView);
    }

    function renderTotem(person) {
      const n = person.index;
      const rotation = (n * 17) % 180;
      const sides = 3 + (n % 6);
      const inner = 18 + (n % 5) * 3;
      const points = Array.from({ length: sides }, (_, i) => {
        const a = -Math.PI / 2 + i * Math.PI * 2 / sides;
        return `${50 + Math.cos(a) * 29},${50 + Math.sin(a) * 29}`;
      }).join(" ");
      const small = Array.from({ length: 4 + (n % 4) }, (_, i) => {
        const a = i * Math.PI * 2 / (4 + (n % 4)) + n;
        return `<circle cx="${50 + Math.cos(a) * inner}" cy="${50 + Math.sin(a) * inner}" r="1.8" fill="currentColor" opacity=".9"/>`;
      }).join("");
      return `<div class="totem" aria-hidden="true">
        <svg viewBox="0 0 100 100">
          <polygon points="${points}" fill="none" stroke="currentColor" stroke-width="2.2" opacity=".86" transform="rotate(${rotation} 50 50)"/>
          <circle cx="50" cy="50" r="${12 + (n % 4) * 4}" fill="none" stroke="currentColor" stroke-width="1.8" opacity=".72"/>
          <path d="M50 16 L50 84 M16 50 L84 50" stroke="currentColor" stroke-width="1.4" opacity=".36"/>
          ${small}
        </svg>
      </div>`;
    }

    function resize() {
      const dpr = 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function draw(now) {
      t = now || 0;
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      const cx = w * .58;
      const cy = h * .44;
      const glow = ctx.createRadialGradient(cx, cy, 20, cx, cy, Math.max(w, h) * .44);
      glow.addColorStop(0, "rgba(238,233,220,.15)");
      glow.addColorStop(.32, "rgba(216,192,122,.06)");
      glow.addColorStop(.62, "rgba(143,221,234,.05)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(238,233,220,.07)";
      for (let i = 0; i < 12; i++) {
        const r = 70 + i * 45;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r * 1.3, r * .48, -.18 + Math.sin(t * .0002) * .05, 0, Math.PI * 2);
        ctx.stroke();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    renderIntro();
    requestAnimationFrame(draw);
  </script>
  <script src="./transition-nav.js"></script>
</body>
</html>
